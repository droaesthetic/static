services:
  - type: web
    name: static
    runtime: docker
    plan: free
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DASHBOARD_AUTH_TOKEN
        sync: false
      - key: DASHBOARD_PUBLIC_URL
        sync: false
      - key: RUN_LOCAL_LAVALINK
        value: "false"
      - key: LAVALINK_URL
        sync: false
      - key: LAVALINK_PASSWORD
        sync: false
      - key: BOT_OWNERS
        sync: false
      - key: BOT_MANAGERS
        sync: false
      - key: DEFAULT_VOLUME
        value: "75"
      - key: MAX_QUEUE_SIZE
        value: "100"
